<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredericka+the+Great&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
  <title>NINA BEJO | Portfolio</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #000000;
    }

    .hero {
      --floor-h: 210px;
      --header-h: 9.3vw;
      --header-max-h: 117px;
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000000;
    }

    .hero-header {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      width: 100%;
      height: min(var(--header-max-h), var(--header-h));
      display: block;
      z-index: 10;
      pointer-events: none;
    }

    .header-sections {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: min(var(--header-max-h), var(--header-h));
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      padding-top: clamp(10px, 1.6vw, 16px);
      gap: 0;
      z-index: 11;
      pointer-events: auto;
    }

    .header-section-title {
      border: 0;
      background: transparent;
      color: #ececec;
      font-family: "Fredericka the Great", serif;
      font-size: clamp(0.82rem, 1.22vw, 1.06rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      padding: 0 6px;
      cursor: pointer;
      transition: color 120ms ease, text-shadow 120ms ease;
    }

    .header-section-title.is-active {
      color: #d4af37;
      text-shadow: 0 1px 8px rgba(212, 175, 55, 0.42);
    }

    .shelves {
      position: absolute;
      left: 0;
      right: 0;
      top: min(var(--header-max-h), var(--header-h));
      bottom: calc(var(--floor-h) - 6px);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: stretch;
      gap: 0;
      width: 100%;
      margin: 0;
      border-top: 10px solid #000000;
      z-index: 8;
      overflow: hidden;
    }

    .shelf-card {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .shelf-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .floor {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -6px;
      width: 100%;
      height: calc(var(--floor-h) + 12px);
      object-fit: cover;
      z-index: 7;
      pointer-events: none;
      background: linear-gradient(to top, #9f7353 0%, #b98a67 100%);
    }

    .floor-logo-right {
      position: absolute;
      right: clamp(20px, 4vw, 56px);
      bottom: 18px;
      width: min(260px, 28vw);
      height: auto;
      object-fit: contain;
      object-position: left center;
      filter: grayscale(1) contrast(1.25) brightness(0.9);
      opacity: 0.85;
      z-index: 10;
      pointer-events: none;
    }

    .book-shape {
      cursor: pointer;
    }

    .book-hover-preview {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%) translateY(14px);
      width: fit-content;
      max-width: min(560px, 76vw);
      pointer-events: none;
      z-index: 12;
      opacity: 0;
      transition: opacity 120ms ease, transform 120ms ease;
      padding: 0;
    }

    .book-hover-preview.visible {
      opacity: 1;
      transform: translate(-50%, -50%);
    }

    .contacts-preview {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      width: fit-content;
      padding: 0;
      background: transparent;
      border: 0;
      color: #f3f3f3;
      z-index: 11;
      opacity: 0;
      transition: opacity 120ms ease;
      pointer-events: auto;
    }

    .contacts-preview.visible {
      opacity: 1;
    }

    .contacts-title {
      font-family: "Cinzel", serif;
      font-size: 1.45rem;
      letter-spacing: 0.07em;
      margin: 0 0 10px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
    }

    .contacts-icons {
      display: inline-flex;
      gap: 12px;
      margin: 0 0 10px 10px;
      vertical-align: middle;
    }

    .social-icon {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.44);
      border-radius: 50%;
      color: #f3f3f3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(1px);
      transition: transform 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .social-icon:hover {
      transform: translateY(-2px) scale(1.04);
      border-color: #d4af37;
      color: #d4af37;
    }

    .social-icon svg {
      width: 20px;
      height: 20px;
      display: block;
      fill: currentColor;
    }

    .contact-info {
      margin: 0 0 10px;
      line-height: 1.55;
      font-size: 0.94rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
    }

    .contact-link {
      color: #f3f3f3;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.45);
      transition: color 120ms ease, border-color 120ms ease;
    }

    .contact-link:hover {
      color: #d4af37;
      border-color: #d4af37;
    }

    .download-cv {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, 0.52);
      color: #ffffff;
      text-decoration: none;
      font-size: 0.86rem;
      letter-spacing: 0.03em;
      background: rgba(0, 0, 0, 0.2);
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .download-cv:hover {
      transform: translateY(-1px);
      border-color: #d4af37;
      color: #d4af37;
    }

    .book-hover-preview img {
      display: block;
      width: 150px;
      height: 112px;
      object-fit: cover;
      border: 0;
      box-shadow: none;
      background: #121212;
    }

    .book-hover-preview img.hidden {
      display: none;
    }

    .book-hover-preview-title {
      margin-top: 0;
      color: #d4af37;
      padding: 0;
      font-family: "Fredericka the Great", serif;
      font-size: 1.5rem;
      font-weight: 700;
      text-align: left;
      letter-spacing: 0.01em;
      
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .book-hover-preview-description {
      margin-top: 0;
      color: #eeeeee;
      padding: 0;
      font-size: 0.92rem;
      line-height: 1.35;
      text-align: center;
      max-height: 2.7em;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .book-hover-preview-content {
      display: grid;
      grid-template-columns: auto auto;
      gap: 8px;
      align-items: start;
    }

    .book-hover-preview-meta {
      min-width: 0;
      max-width: min(380px, 48vw);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .book-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 16px;
    }

    .book-modal.open {
      display: flex;
    }

    .book-modal-card {
      width: min(860px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #181818;
      color: #f1f1f1;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
    }

    .book-modal-close {
      float: right;
      background: #2a2a2a;
      color: #f1f1f1;
      border: 1px solid #474747;
      padding: 6px 10px;
      cursor: pointer;
    }

    .book-modal h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .book-kv {
      margin: 6px 0;
      font-size: 0.95rem;
    }

    .book-kv span {
      color: #a4a4a4;
      margin-right: 8px;
    }

    .book-main-image {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border: 1px solid #2c2c2c;
      margin: 10px 0 14px;
    }

    .book-pages {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
    }

    .book-pages img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border: 1px solid #2c2c2c;
    }

    .tattoo-overlay {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center;
      z-index: 9;
      pointer-events: none;
    }

    @media (max-width: 1024px) {
      .shelves {
        bottom: calc(var(--floor-h) - 6px);
      }
    }

    @media (max-width: 640px) {
      .hero {
        --floor-h: 160px;
      }

      .floor-logo-right {
        width: min(180px, 42vw);
        right: 14px;
        bottom: 10px;
      }

      .book-hover-preview {
        width: min(92vw, 520px);
      }

      .book-hover-preview-content {
        grid-template-columns: 120px 1fr;
        gap: 10px;
      }

      .book-hover-preview img {
        width: 120px;
        height: 96px;
      }

      .book-hover-preview-title {
        font-size: 1.2rem;
      }

      .shelves {
        bottom: calc(var(--floor-h) - 6px);
      }
    }
  </style>
</head>

<body>

  <script>
    const shelvesRoot = document.getElementById("shelves");
    const headerSectionsRoot = document.getElementById("header-sections");
    const floorElement = document.getElementById("floor");
    const modal = document.getElementById("book-modal");
    const modalClose = document.getElementById("book-modal-close");
    const modalContent = document.getElementById("book-modal-content");
    const hoverPreview = document.getElementById("book-hover-preview");
    const contactsPreview = document.getElementById("contacts-preview");
    const hoverPreviewImage = document.getElementById("book-hover-preview-image");
    const hoverPreviewTitle = document.getElementById("book-hover-preview-title");
    const hoverPreviewDescription = document.getElementById("book-hover-preview-description");
    const escapeXml = (value) =>
      String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&apos;");

    const hashString = (value) => {
      const source = String(value || "");
      let hash = 0;
      for (let i = 0; i < source.length; i += 1) {
        hash = (hash * 31 + source.charCodeAt(i)) >>> 0;
      }
      return hash;
    };

    const DEFAULT_BOOK_STYLES = [
      "obsidian",
      "charcoal",
      "graphite",
      "slate",
      "pewter",
      "ivory"
    ];

    const randomBookStyle = () => {
      const index = Math.floor(Math.random() * DEFAULT_BOOK_STYLES.length);
      return DEFAULT_BOOK_STYLES[index];
    };

    const resolveBookStyle = (styleName) => {
      if (typeof styleName === "string" && DEFAULT_BOOK_STYLES.includes(styleName)) {
        return styleName;
      }
      return randomBookStyle();
    };

    const normalizeBook = (source, categoryName) => ({
      id: source.id || "",
      title: source.title || "",
      style: resolveBookStyle(source.style),
      category: source.category || categoryName,
      description: source.description || "",
      mainImage: source.mainImage || "",
      pageImages: Array.isArray(source.pageImages) && source.pageImages.length ? source.pageImages : ["assets/bookshelf.svg"]
    });

    const normalizeBooks = (books, count, categoryName) => {
      const sourceBooks = Array.isArray(books) ? books.filter(Boolean) : [];
      const normalized = Array.from({ length: count }, (_, index) => ({
        id: "",
        title: "",
        style: randomBookStyle(),
        category: categoryName,
        description: "",
        mainImage: "",
        pageImages: ["assets/bookshelf.svg"]
      }));
      const usedSlots = new Set();
      const seenIds = new Set();

      sourceBooks.forEach((source) => {
        if (!source || !source.id || seenIds.has(source.id)) return;
        seenIds.add(source.id);
        let slot = hashString(`${categoryName}:${source.id}`) % count;
        while (usedSlots.has(slot)) {
          slot = (slot + 1) % count;
        }
        usedSlots.add(slot);
        normalized[slot] = normalizeBook(source, categoryName);
      });

      return normalized;
    };

    const stylePalette = (styleName) => {
      if (styleName === "obsidian") return { spine: "#1a1a1a", left: "#000000", right: "#333333", top: "#444444" };
      if (styleName === "charcoal") return { spine: "#2a2a2a", left: "#111111", right: "#444444", top: "#555555" };
      if (styleName === "graphite") return { spine: "#333333", left: "#1a1a1a", right: "#555555", top: "#666666" };
      if (styleName === "slate") return { spine: "#444444", left: "#222222", right: "#666666", top: "#777777" };
      if (styleName === "pewter") return { spine: "#666666", left: "#444444", right: "#888888", top: "#999999" };
      if (styleName === "ivory") return { spine: "#dddddd", left: "#bbbbbb", right: "#ffffff", top: "#ffffff" };
      return stylePalette(resolveBookStyle(styleName));
    };

    const buildShelfSvg = (width, height, books) => {
      const shelvesCount = 5;
      const frameW = Math.max(12, Math.floor(width * 0.055));
      const topBottom = Math.max(12, Math.floor(height * 0.042));
      const innerX = frameW;
      const innerY = topBottom;
      const innerW = Math.max(20, width - frameW * 2);
      const innerH = Math.max(20, height - topBottom * 2);
      const rowH = innerH / shelvesCount;
      const booksPerRow = Math.max(10, Math.floor(width / 16));

      let svg = "";
      svg += `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">`;
      svg += `<rect x="0" y="0" width="${width}" height="${height}" fill="#101010"/>`;
      svg += `<rect x="${innerX}" y="${innerY}" width="${innerW}" height="${innerH}" fill="#181818"/>`;
      svg += `<rect x="0" y="0" width="${frameW}" height="${height}" fill="#0a0a0a"/>`;
      svg += `<rect x="${width - frameW}" y="0" width="${frameW}" height="${height}" fill="#0a0a0a"/>`;
      svg += `<rect x="0" y="0" width="${width}" height="${topBottom}" fill="#0b0b0b"/>`;
      svg += `<rect x="0" y="${height - topBottom}" width="${width}" height="${topBottom}" fill="#0b0b0b"/>`;
      svg += `<rect x="${innerX}" y="${innerY}" width="${innerW}" height="1" fill="#555" opacity="0.45"/>`;
      svg += `<rect x="${innerX}" y="${innerY}" width="1" height="${innerH}" fill="#555" opacity="0.35"/>`;
      svg += `<rect x="${innerX + innerW - 1}" y="${innerY}" width="1" height="${innerH}" fill="#555" opacity="0.35"/>`;
      svg += `<defs>`;
      svg += `<filter id="book-title-shadow" x="-120%" y="-120%" width="340%" height="340%">`;
      svg += `<feDropShadow dx="0.4" dy="0.5" stdDeviation="0.55" flood-color="#1a1206" flood-opacity="0.95"/>`;
      svg += `<feDropShadow dx="0.1" dy="0.1" stdDeviation="0.25" flood-color="#f8e4ad" flood-opacity="0.55"/>`;
      svg += `</filter>`;
      svg += `</defs>`;

      let bookIndex = 0;
      for (let row = 0; row < shelvesCount; row += 1) {
        const shelfY = innerY + row * rowH;
        const shelfLineY = shelfY + rowH - Math.max(5, Math.floor(height * 0.011));
        svg += `<rect x="${innerX}" y="${shelfLineY}" width="${innerW}" height="4" fill="#666"/>`;
        svg += `<rect x="${innerX}" y="${shelfLineY + 4}" width="${innerW}" height="1" fill="#a0a0a0" opacity="0.18"/>`;

        let cursorX = innerX + 3;
        const rowBottom = shelfLineY;
        for (let col = 0; col < booksPerRow; col += 1) {
          const slotIndex = bookIndex;
          const b = books[slotIndex] || null;
          bookIndex += 1;
          const bookW = Math.max(6, Math.floor(innerW / booksPerRow) - 1);
          const sizeSeed = b && b.id ? `${b.id}:${row}:${col}` : `${row}:${col}`;
          const heightSeed = hashString(sizeSeed) % 1000;
          const heightRatio = 0.58 + (heightSeed / 1000) * 0.34;
          const bookH = Math.max(18, Math.floor(rowH * heightRatio));
          const bookY = rowBottom - bookH;
          const p = stylePalette(b && b.style ? b.style : "dark");
          const leftW = Math.max(1.5, Math.floor(bookW * 0.16));
          const rightW = Math.max(1, Math.floor(bookW * 0.08));
          const topH = Math.max(1.5, Math.floor(bookH * 0.03));
          const hasBook = Boolean(b && b.id);
          if (hasBook) {
            const safeBookId = escapeXml(String(b.id));
            svg += `<g class="book-shape" data-book-id="${safeBookId}">`;
          } else {
            svg += "<g>";
          }
          svg += `<rect x="${cursorX}" y="${bookY}" width="${bookW}" height="${bookH}" rx="0.8" fill="${p.spine}"/>`;
          svg += `<rect x="${cursorX}" y="${bookY}" width="${leftW}" height="${bookH}" fill="${p.left}" opacity="0.9"/>`;
          svg += `<rect x="${cursorX + bookW - rightW}" y="${bookY}" width="${rightW}" height="${bookH}" fill="${p.right}" opacity="0.65"/>`;
          svg += `<rect x="${cursorX}" y="${bookY}" width="${bookW}" height="${topH}" fill="${p.top}" opacity="0.45"/>`;
          if (hasBook && b.title && bookH > 30 && bookW > 10) {
            const safeTitle = escapeXml(String(b.title).toUpperCase());
            const textX = cursorX + Math.floor(bookW * 0.55);
            const textY = bookY + bookH - 4;
            const titleSize = Math.max(3.2, Math.min(5, bookW * 0.33));
            svg += `<text x="${textX}" y="${textY}" fill="#d4af37" stroke="#3b2a08" stroke-width="0.2" font-size="${titleSize}" transform="rotate(-90,${textX},${textY})" font-family="Georgia,serif" opacity="0.96" filter="url(#book-title-shadow)" letter-spacing="0.2">${safeTitle}</text>`;
          }
          svg += `</g>`;
          cursorX += bookW + 1;
        }
      }

      svg += "</svg>";
      return svg;
    };

    const showContactsPreview = () => {
      contactsPreview.classList.add("visible");
      positionFloorPreview();
    };

    const hideContactsPreview = () => {
      contactsPreview.classList.remove("visible");
    };

    const showFloorPreview = (book) => {
      if (!book || !book.title) {
        hideHoverPreview();
        return;
      }
      hideContactsPreview();
      if (book.mainImage) {
        hoverPreviewImage.src = book.mainImage;
        hoverPreviewImage.alt = book.title;
        hoverPreviewImage.classList.remove("hidden");
      } else {
        hoverPreviewImage.removeAttribute("src");
        hoverPreviewImage.alt = "";
        hoverPreviewImage.classList.add("hidden");
      }
      hoverPreviewTitle.textContent = book.title;
      hoverPreviewDescription.textContent = book.description || "";
      positionFloorPreview();
      hoverPreview.classList.add("visible");
    };

    const hideHoverPreview = () => {
      hoverPreview.classList.remove("visible");
      showContactsPreview();
    };

    const positionFloorPreview = () => {
      const heroRect = document.querySelector(".hero").getBoundingClientRect();
      const floorRect = floorElement.getBoundingClientRect();
      const centerX = floorRect.left + floorRect.width * 0.4 - heroRect.left;
      const centerY = floorRect.top + floorRect.height / 2 - heroRect.top;
      hoverPreview.style.left = `${centerX}px`;
      hoverPreview.style.top = `${centerY}px`;
      contactsPreview.style.left = `${centerX}px`;
      contactsPreview.style.top = `${centerY}px`;
    };

    const openBookModal = (book) => {
      modalContent.innerHTML = "";
      const pages = (book.pageImages || [])
        .map((img) => `<img src="${img}" alt="${book.title} page image">`)
        .join("");
      modalContent.innerHTML = `
        <h2>${book.title}</h2>
        <div class="book-kv"><span>ID:</span>${book.id}</div>
        <div class="book-kv"><span>Style:</span>${book.style}</div>
        <div class="book-kv"><span>Category:</span>${book.category}</div>
        <div class="book-kv"><span>Description:</span>${book.description}</div>
        <img class="book-main-image" src="${book.mainImage}" alt="${book.title} main image">
        <div class="book-kv"><span>Page images:</span></div>
        <div class="book-pages">${pages}</div>
      `;
      modal.classList.add("open");
    };

    const setActiveHeaderSection = (categoryKey) => {
      const buttons = headerSectionsRoot.querySelectorAll("[data-category-key]");
      buttons.forEach((button) => {
        const isActive = categoryKey && button.dataset.categoryKey === categoryKey;
        button.classList.toggle("is-active", Boolean(isActive));
      });
    };

    const clearActiveHeaderSection = () => {
      setActiveHeaderSection("");
    };

    const createHeaderSections = (categories) => {
      headerSectionsRoot.innerHTML = "";
      categories.forEach((category) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "header-section-title";
        button.dataset.categoryKey = category.key;
        button.textContent = category.title;
        button.addEventListener("mouseenter", () => setActiveHeaderSection(category.key));
        button.addEventListener("mouseleave", clearActiveHeaderSection);
        headerSectionsRoot.appendChild(button);
      });
    };

    const createShelf = (categoryKey, categoryTitle, books) => {
      const card = document.createElement("article");
      card.className = "shelf-card";
      card.setAttribute("aria-label", categoryTitle + " bookshelf");
      card.dataset.categoryKey = categoryKey;
      card.addEventListener("mouseenter", () => setActiveHeaderSection(categoryKey));
      card.addEventListener("mouseleave", clearActiveHeaderSection);

      const svgHolder = document.createElement("div");
      svgHolder.className = "shelf-svg";
      card.appendChild(svgHolder);

      const renderSvgToCard = () => {
        const bounds = card.getBoundingClientRect();
        const w = Math.max(60, Math.floor(bounds.width));
        const h = Math.max(80, Math.floor(bounds.height));
        const shelvesCount = 5;
        const booksPerRow = Math.max(10, Math.floor(w / 16));
        const slotCount = shelvesCount * booksPerRow;
        const normalizedBooks = normalizeBooks(books, slotCount, categoryKey);
        const svg = buildShelfSvg(w, h, normalizedBooks);
        svgHolder.innerHTML = svg;
        const svgElement = svgHolder.querySelector("svg");
        if (!svgElement) return;
        const booksById = new Map(
          normalizedBooks
            .filter((book) => book && book.id)
            .map((book) => [book.id, book])
        );

        svgElement.addEventListener("mousemove", (event) => {
          const target = event.target.closest("[data-book-id]");
          if (!target) {
            hideHoverPreview();
            return;
          }
          const id = target.getAttribute("data-book-id");
          const book = id ? booksById.get(id) : null;
          if (!book) {
            hideHoverPreview();
            return;
          }
          showFloorPreview(book);
        });
        svgElement.addEventListener("mouseleave", hideHoverPreview);
        svgElement.addEventListener("click", (event) => {
          const target = event.target.closest("[data-book-id]");
          if (!target) return;
          const id = target.getAttribute("data-book-id");
          const book = id ? booksById.get(id) : null;
          if (!book) return;
          showFloorPreview(book);
          openBookModal(book);
        });
      };

      requestAnimationFrame(renderSvgToCard);
      window.addEventListener("resize", renderSvgToCard);
      return card;
    };

    const renderShelves = async () => {
      shelvesRoot.innerHTML = "";
      headerSectionsRoot.innerHTML = "";
      try {
        const response = await fetch("./data.json");
        const data = await response.json();
        const rawCategories = Array.isArray(data.categories) ? data.categories.slice(0, 5) : [];
        const categories = rawCategories
          .map((item) => {
            const key = item.id || item.title || "";
            if (!key) return null;
            return {
              key,
              title: item.title || item.id || "",
              books: Array.isArray(item.books) ? item.books : []
            };
          })
          .filter(Boolean);

        createHeaderSections(categories);

        categories.forEach((category) => {
          shelvesRoot.appendChild(createShelf(category.key, category.title, category.books));
        });
      } catch (_error) {
        shelvesRoot.innerHTML = "";
        headerSectionsRoot.innerHTML = "";
      }
    };

    renderShelves();

    document.addEventListener("mousemove", (event) => {
      if (!event.target.closest("[data-book-id]")) {
        hideHoverPreview();
      }
    });

    modalClose.addEventListener("click", () => {
      modal.classList.remove("open");
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        modal.classList.remove("open");
      }
    });

    floorElement.addEventListener("error", () => {
      if (!floorElement.dataset.fallbackTried) {
        floorElement.dataset.fallbackTried = "true";
        floorElement.src = "data/floor.png";
        return;
      }
      floorElement.src = "";
    });

    floorElement.addEventListener("load", positionFloorPreview);
    window.addEventListener("resize", positionFloorPreview);
  </script>
</body>
</html>
