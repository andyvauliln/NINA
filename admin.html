<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Nina Bejo Admin</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; color: #222; }
      .layout { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
      .sidebar { border-right: 1px solid #ddd; background: #fff; padding: 16px; overflow-y: auto; }
      .content { padding: 24px; }
      h1, h2, h3 { margin: 0 0 12px; }
      .book-item { padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px; cursor: pointer; background: #fafafa; }
      .book-item:hover, .book-item.active { border-color: #555; background: #eee; }
      .category-title { margin: 18px 0 8px; font-size: 14px; color: #555; text-transform: uppercase; }
      .btn { border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; }
      .btn-primary { background: #222; color: #fff; }
      .btn-secondary { background: #ddd; color: #222; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
      input, textarea, select { border: 1px solid #bbb; border-radius: 8px; padding: 10px; font: inherit; background: #fff; }
      textarea { min-height: 90px; resize: vertical; }
      .actions { display: flex; gap: 10px; margin-top: 10px; }
      .note { margin-top: 12px; color: #444; font-size: 14px; }
      .img-preview { max-width: 160px; max-height: 110px; object-fit: cover; border-radius: 6px; border: 1px solid #ccc; margin-top: 6px; display: none; }
      .page-previews { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
      .page-previews img { width: 90px; height: 65px; object-fit: cover; border-radius: 4px; border: 1px solid #ccc; }
      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2>Books</h2>
        <button id="create-new-btn" class="btn btn-primary" type="button">Create New Book</button>
        <div id="books-list"></div>
      </aside>
      <main class="content">
        <h1>Book Editor</h1>
        <form id="book-form">
          <div class="row">
            <label class="field">
              <span>ID</span>
              <input id="book-id" name="id" required />
            </label>
            <label class="field">
              <span>Category</span>
              <input id="book-category" name="category" required />
            </label>
          </div>

          <div class="row">
            <label class="field">
              <span>Title</span>
              <input id="book-title" name="title" required />
            </label>
            <label class="field">
              <span>Style</span>
              <select id="book-style" name="style"></select>
            </label>
          </div>

          <label class="field">
            <span>Description</span>
            <textarea id="book-description" name="description"></textarea>
          </label>

          <label class="field">
            <span>Main Image</span>
            <input id="book-main-image" name="mainImage" />
            <img id="main-image-preview" class="img-preview" alt="main preview" />
          </label>

          <label class="field">
            <span>Page Images (one path per line)</span>
            <textarea id="book-page-images" name="pageImages"></textarea>
            <div id="page-image-previews" class="page-previews"></div>
          </label>

          <div class="actions">
            <button class="btn btn-primary" id="save-btn" type="submit">Save</button>
            <button class="btn btn-secondary" id="reset-btn" type="button">Reset</button>
            <button class="btn btn-secondary" id="delete-btn" type="button">Delete</button>
          </div>
          <div class="note" id="status"></div>
        </form>
      </main>
    </div>

    <script>
      const booksListEl = document.getElementById("books-list");
      const createNewBtn = document.getElementById("create-new-btn");
      const form = document.getElementById("book-form");
      const statusEl = document.getElementById("status");
      const resetBtn = document.getElementById("reset-btn");
      const deleteBtn = document.getElementById("delete-btn");

      const formFields = {
        id: document.getElementById("book-id"),
        category: document.getElementById("book-category"),
        title: document.getElementById("book-title"),
        style: document.getElementById("book-style"),
        description: document.getElementById("book-description"),
        mainImage: document.getElementById("book-main-image"),
        pageImages: document.getElementById("book-page-images")
      };

      const mainPreview = document.getElementById("main-image-preview");
      const pagePreviewsEl = document.getElementById("page-image-previews");

      const toAbsolute = (p) => {
        if (!p || p.startsWith("/") || p.startsWith("http")) return p;
        return "/" + p;
      };

      const updateMainPreview = () => {
        const val = formFields.mainImage.value.trim();
        if (val) {
          mainPreview.src = toAbsolute(val);
          mainPreview.style.display = "block";
          mainPreview.onerror = () => { mainPreview.style.display = "none"; };
        } else {
          mainPreview.style.display = "none";
        }
      };

      const updatePagePreviews = () => {
        const lines = formFields.pageImages.value.split("\n").map(l => l.trim()).filter(Boolean);
        pagePreviewsEl.innerHTML = "";
        lines.forEach((p) => {
          const img = document.createElement("img");
          img.src = toAbsolute(p);
          img.alt = p.split("/").pop();
          img.onerror = () => { img.style.display = "none"; };
          pagePreviewsEl.appendChild(img);
        });
      };

      formFields.mainImage.addEventListener("input", updateMainPreview);
      formFields.pageImages.addEventListener("input", updatePagePreviews);

      let currentMode = "create";
      let editingOriginalId = "";
      let allBooks = [];

      const emptyBook = () => ({
        id: "",
        category: "",
        title: "",
        style: "",
        description: "",
        mainImage: "",
        pageImages: []
      });

      const setStatus = (text, isError = false) => {
        statusEl.textContent = text;
        statusEl.style.color = isError ? "#b00020" : "#1d5f2f";
      };

      const fillForm = (book) => {
        formFields.id.value = book.id || "";
        formFields.category.value = book.category || "";
        formFields.title.value = book.title || "";
        formFields.style.value = book.style || "";
        formFields.description.value = book.description || "";
        formFields.mainImage.value = book.mainImage || "";
        formFields.pageImages.value = Array.isArray(book.pageImages) ? book.pageImages.join("\n") : "";
        updateMainPreview();
        updatePagePreviews();
      };

      const readForm = () => ({
        id: formFields.id.value.trim(),
        category: formFields.category.value.trim(),
        title: formFields.title.value.trim(),
        style: formFields.style.value.trim(),
        description: formFields.description.value.trim(),
        mainImage: formFields.mainImage.value.trim(),
        pageImages: formFields.pageImages.value
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
      });

      const setCreateMode = () => {
        currentMode = "create";
        editingOriginalId = "";
        fillForm(emptyBook());
        setStatus("Create mode.");
        deleteBtn.disabled = true;
        document.querySelectorAll(".book-item.active").forEach((el) => el.classList.remove("active"));
      };

      const setEditMode = (book, element) => {
        currentMode = "edit";
        editingOriginalId = book.id;
        fillForm(book);
        setStatus(`Editing "${book.title}"`);
        deleteBtn.disabled = false;
        document.querySelectorAll(".book-item.active").forEach((el) => el.classList.remove("active"));
        if (element) element.classList.add("active");
      };

      const renderBooks = (categories) => {
        booksListEl.innerHTML = "";
        allBooks = [];
        categories.forEach((category) => {
          const categoryTitle = document.createElement("div");
          categoryTitle.className = "category-title";
          categoryTitle.textContent = category.title || category.id || "Category";
          booksListEl.appendChild(categoryTitle);

          (category.books || []).forEach((book) => {
            allBooks.push(book);
            const item = document.createElement("div");
            item.className = "book-item";
            item.textContent = `${book.title || "(untitled)"} (${book.id || "-"})`;
            item.addEventListener("click", () => setEditMode(book, item));
            booksListEl.appendChild(item);
          });
        });
      };

      const populateStyleDropdown = (views) => {
        const sel = formFields.style;
        const current = sel.value;
        sel.innerHTML = "";
        (views || []).forEach((v) => {
          const opt = document.createElement("option");
          opt.value = v.id;
          opt.textContent = v.name || v.id;
          sel.appendChild(opt);
        });
        if (current && sel.querySelector('option[value="' + current + '"]')) {
          sel.value = current;
        }
      };

      const loadData = async () => {
        const response = await fetch("/api/books-data");
        const data = await response.json();
        if (Array.isArray(data.bookViews)) {
          populateStyleDropdown(data.bookViews);
        }
        const categories = Array.isArray(data.categories) ? data.categories : [];
        renderBooks(categories);
      };

      const saveBook = async (bookPayload) => {
        const isEdit = currentMode === "edit" && editingOriginalId;
        const endpoint = isEdit ? `/api/books/${encodeURIComponent(editingOriginalId)}` : "/api/books";
        const method = isEdit ? "PUT" : "POST";

        const response = await fetch(endpoint, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(bookPayload)
        });
        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.error || "Failed to save");
        }
        return result;
      };

      createNewBtn.addEventListener("click", setCreateMode);
      resetBtn.addEventListener("click", () => {
        if (currentMode === "edit") {
          const current = allBooks.find((item) => item.id === editingOriginalId);
          fillForm(current || emptyBook());
          return;
        }
        fillForm(emptyBook());
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus("Saving...");
        const payload = readForm();
        try {
          await saveBook(payload);
          await loadData();
          if (currentMode === "create") {
            setStatus(`Created "${payload.title}"`);
            setCreateMode();
          } else {
            editingOriginalId = payload.id;
            setStatus(`Updated "${payload.title}"`);
          }
        } catch (error) {
          setStatus(String(error.message || error), true);
        }
      });

      deleteBtn.addEventListener("click", async () => {
        if (currentMode !== "edit" || !editingOriginalId) {
          setStatus("Select a book to delete.", true);
          return;
        }
        const confirmDelete = window.confirm(`Delete book "${editingOriginalId}"?`);
        if (!confirmDelete) return;
        try {
          setStatus("Deleting...");
          const response = await fetch(`/api/books/${encodeURIComponent(editingOriginalId)}`, { method: "DELETE" });
          const result = await response.json();
          if (!response.ok) {
            throw new Error(result.error || "Failed to delete");
          }
          await loadData();
          setCreateMode();
          setStatus(`Deleted "${result.id}"`);
        } catch (error) {
          setStatus(String(error.message || error), true);
        }
      });

      loadData().then(setCreateMode).catch((error) => {
        setStatus(`Failed to load: ${String(error.message || error)}`, true);
      });
    </script>
  </body>
</html>
